<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f172a", // Slate-900 as requested
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-6">
<!-- Confirmation Modal Card -->
<div class="w-full max-w-sm bg-slate-800/90 border border-slate-700/50 rounded-2xl shadow-2xl overflow-hidden flex flex-col items-center p-8">
<!-- Warning Icon Header -->
<div class="mb-6 flex items-center justify-center">
<div class="w-16 h-16 rounded-full bg-red-500/20 flex items-center justify-center border border-red-500/30">
<span class="material-symbols-outlined text-red-500 text-4xl">warning</span>
</div>
</div>
<!-- Title -->
<h2 class="text-slate-100 text-2xl font-bold tracking-tight mb-2 text-center">¿Estás seguro?</h2>
<p class="text-slate-400 text-sm mb-8 text-center uppercase tracking-widest font-medium">Resumen de solicitud</p>
<!-- Booking Details Box -->
<div class="w-full bg-slate-900/60 border border-slate-700/80 rounded-xl p-5 mb-8 space-y-3">
<div class="flex flex-col gap-2">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">meeting_room</span>
<p class="text-slate-200 text-base font-medium">Sala 3</p>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">calendar_today</span>
<p class="text-slate-200 text-base">04/03/2026</p>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">schedule</span>
<p class="text-slate-200 text-base">12:00 a 14:00</p>
</div>
</div>
<div class="pt-3 border-t border-slate-700/50">
<p class="text-slate-400 italic text-sm">"Prueba 1"</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex w-full gap-3">
<button class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-100 font-bold py-3.5 rounded-xl transition-colors text-center text-sm">
                    Cancelar
                </button>
<button class="flex-1 bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-primary/20 text-center text-sm">
                    Aceptar
                </button>
</div>
</div>
</div>
<!-- Background Mockup for context (bottom nav) -->
<div class="fixed bottom-0 left-0 right-0 z-[-1] pointer-events-none opacity-20">
<div class="flex gap-2 border-t border-slate-800 bg-slate-900 px-4 pb-8 pt-2">
<div class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium">Inicio</p>
</div>
<div class="flex flex-1 flex-col items-center justify-end gap-1 text-primary">
<span class="material-symbols-outlined">calendar_month</span>
<p class="text-[10px] font-medium">Reservas</p>
</div>
<div class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500">
<span class="material-symbols-outlined">grid_view</span>
<p class="text-[10px] font-medium">Espacios</p>
</div>
<div class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium">Perfil</p>
</div>
</div>
</div>
</body></html>
