version: '3.8'

services:
  app:
    image: cfanton/reservas-inta:latest
    container_name: reservas-inta-app
    restart: always
    # No publicamos puertos directamente: Coolify usa Traefik como proxy inverso
    # y gestiona la exposición y el HTTPS automáticamente.
    expose:
      - "3000"
    environment:
      PORT: 3000
      DB_HOST: ${DB_HOST:-172.17.0.1}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-ojoseco6971}
      DB_NAME: ${DB_NAME:-reservas_inta}
      JWT_SECRET: ${JWT_SECRET:-cambia_esto_en_produccion}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
