version: '3.8'

services:
  app:
    image: cfanton/reservas-inta:latest
    container_name: reservas-inta-app
    restart: always
    # No publicamos puertos directamente: Coolify usa Traefik como proxy inverso
    # y gestiona la exposición y el HTTPS automáticamente.
    expose:
      - "3000"
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - PORT=3000
      - DB_HOST=${DB_HOST:-172.17.0.1}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-reservas_inta}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - reservas_logs:/app/logs
      - reservas_storage:/app/storage
      - reservas_uploads:/app/backend/uploads

volumes:
  reservas_logs:
    name: reservas_inta_logs
  reservas_storage:
    name: reservas_inta_storage
  reservas_uploads:
    name: reservas_inta_uploads
